name: QCA-6.12-VIKINGYFY

# CI计划
on:
  # 手动编译触发器
  workflow_dispatch:
    inputs:
      PACKAGE:
        description: '手动调整插件包，多个请用\n符号隔开。'
        required: false
        type: string
      TEST:
        description: '仅输出配置文件，不编译固件。'
        default: 'false'
        required: false
        type: boolean

# CI权限
permissions: write-all

# CI任务
jobs:
  config:
    name: ${{matrix.CONFIG}}
    strategy:
      fail-fast: false
      matrix:
        # 🚨 核心修改：移除 IPQ60XX-WIFI，专注于单款 NOWIFI 有线纯主路由固件
        CONFIG: [IPQ60XX-NOWIFI]
        SOURCE: [VIKINGYFY/immortalwrt]
        BRANCH: [main]

    # 调用公用编译核心 WRT-CORE.yml
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      # 编译配置
      WRT_CONFIG: ${{matrix.CONFIG}}
      # 默认主题
      WRT_THEME: argon
      # 默认主机名（刷机后显示的名称）
      WRT_NAME: DAE-WRT
      # 默认WIFI名称（虽然NOWIFI固件不开启无线，但保留参数以防底层 Makefile 验证）
      WRT_SSID: DAE-WRT
      # 默认WIFI密码
      WRT_WORD: 12345678
      # 默认后台管理地址
      WRT_IP: 192.168.5.1
      # 默认密码，仅作提示，修改无用
      WRT_PW: 无
      # 源码链接
      WRT_REPO: https://github.com/${{matrix.SOURCE}}.git
      # 源码分支
      WRT_BRANCH: ${{matrix.BRANCH}}
      # 源码名称
      WRT_SOURCE: ${{matrix.SOURCE}}
      # 插件调整
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      # 仅输出配置文件
      WRT_TEST: ${{inputs.TEST}}

      CI_NAME: ${{github.workflow}}
